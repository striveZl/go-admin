services:
  pg:
    image: postgres:17
    environment:
      POSTGRES_DB: go_admin
      POSTGRES_USER: strive
      POSTGRES_PASSWORD: 123456
      PGTZ: Asia/Shanghai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: